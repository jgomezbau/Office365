<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O365 Linux Desktop</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div id="app" class="app">
      <div id="tab-bar" style="-webkit-app-region: drag;">
      <!-- Contenedor de pestañas -->
      <div id="tabs-area">
        <div id="tabs"></div>
        <div id="tab-overflow-nav" class="tab-overflow-nav is-hidden" aria-label="Navegación de pestañas">
          <button id="tabs-nav-left" class="tab-nav-btn" type="button" title="Pestañas anteriores" aria-label="Pestañas anteriores">
            <span class="material-symbols-rounded">chevron_left</span>
          </button>
          <button id="tabs-nav-right" class="tab-nav-btn" type="button" title="Pestañas siguientes" aria-label="Pestañas siguientes">
            <span class="material-symbols-rounded">chevron_right</span>
          </button>
        </div>
        <button id="new-tab-btn" title="Nueva pestaña">
          <span class="material-symbols-rounded">add</span>
        </button>
      </div>
      
      <!-- Botones de acción -->
      <button id="settings-btn" style="-webkit-app-region: no-drag;" title="Configuración">
        <span class="material-symbols-rounded">settings</span>
      </button>
      <button id="window-min-btn" class="window-control" title="Minimizar">
        <span class="material-symbols-rounded">minimize</span>
      </button>
      <button id="window-max-btn" class="window-control" title="Maximizar">
        <span class="material-symbols-rounded">crop_square</span>
      </button>
      <button id="window-close-btn" class="window-control close" title="Cerrar">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    
    <!-- El contenido de las pestañas se renderiza como WebContentsViews -->

    <!-- Contenedor de notificaciones -->
    <div id="notification-container"></div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
